name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name of existing release to attach EXE to (e.g. v2.5.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller requests websocket-client

      - name: Build EXE
        run: pyinstaller --onefile --name KIA_TOKEN --clean --noconfirm KIA_TOKEN.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KIA_TOKEN-windows
          path: dist/KIA_TOKEN.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.event.release.tag_name }}
          files: dist/KIA_TOKEN.exe